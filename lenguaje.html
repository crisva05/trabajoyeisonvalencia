<!-- lenguaje.html -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lenguaje</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:url("fondo-salmon.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.wrapper{
width:100%;
max-width:1450px;
background:#f5eef1;
border-radius:28px;
overflow:hidden;
display:flex;
box-shadow:0 20px 40px rgba(0,0,0,.15);
}

.sidebar{
width:390px;
background:#D88E8E;
padding:45px 35px;
}

.sidebar h1{
font-size:62px;
font-weight:700;
color:white;
margin-bottom:35px;
letter-spacing:2px;
}

.back{
width:72px;
height:72px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
text-decoration:none;
font-size:30px;
color:#D88E8E;
margin:0 auto 40px;
transition:.3s;
}

.back:hover{
transform:scale(1.08);
}

.menu{
display:flex;
flex-direction:column;
gap:20px;
}

.menu button{
border:none;
height:58px;
border-radius:40px;
background:white;
font-size:18px;
font-weight:700;
color:#D88E8E;
cursor:pointer;
transition:.3s;
}

.menu button:hover{
background:#fff0f4;
transform:translateX(6px);
}

.main{
flex:1;
padding:45px;
}

.icons{
display:flex;
justify-content:center;
gap:22px;
margin-bottom:35px;
flex-wrap:wrap;
}

.icon{
width:85px;
height:85px;
border-radius:50%;
background:#f1bfd0;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
color:#D88E8E;
}

.content{
background:#ffffff;
border-radius:28px;
padding:45px;
min-height:540px;
box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.content h2{
font-size:58px;
color:#D88E8E;
margin-bottom:25px;
font-weight:700;
}

.content p{
font-size:22px;
line-height:1.8;
color:#333;
margin-bottom:18px;
}

.content ul{
padding-left:25px;
}

.content li{
font-size:22px;
margin-bottom:12px;
color:#333;
}

@media(max-width:1100px){
.wrapper{
flex-direction:column;
}
.sidebar{
width:100%;
}
.sidebar h1{
font-size:46px;
text-align:center;
}
.content h2{
font-size:40px;
}
.content p,
.content li{
font-size:18px;
}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">

<h1>LENGUAJE</h1>

<a href="index.html" class="back">
<i class="fa-solid fa-arrow-left"></i>
</a>

<div class="menu">
<button onclick="mostrar('docente')">Guía del docente</button>
<button onclick="mostrar('intro')">Introducción</button>
<button onclick="mostrar('objetivos')">Objetivos</button>
<button onclick="mostrar('desarrollo')">Desarrollo</button>
<button onclick="mostrar('tarea')">Tarea</button>
</div>

</div>

<div class="main">

<div class="icons">
<div class="icon"><i class="fa-solid fa-book-open"></i></div>
<div class="icon"><i class="fa-solid fa-pencil"></i></div>
<div class="icon"><i class="fa-solid fa-graduation-cap"></i></div>
<div class="icon"><i class="fa-solid fa-lightbulb"></i></div>
<div class="icon"><i class="fa-solid fa-star"></i></div>
</div>

<!-- 🔥 SOLO ESTE BLOQUE CAMBIA -->
<div class="content" id="contenido">

<iframe id="visorPDF" style="width:100%; height:500px; border:none;"></iframe>

<br><br>

<a id="btnDescargar" href="#" download
style="background:#D88E8E; color:white; padding:10px 20px; text-decoration:none; border-radius:5px;">
<i class="fa-solid fa-download"></i> Descargar PDF
</a>

</div>

</div>

</div>

<script>

let c = document.getElementById("contenido");

/* GUÍA DOCENTE (1 PDF) */
if(tipo=="docente"){

<br><br>

<a href="pdf/guia-docente.pdf" download
style="background:#D88E8E; color:white; padding:10px 20px; border-radius:5px; text-decoration:none;">
Descargar PDF
</a>

/* INTRODUCCIÓN (2 PDFs) */
if(tipo=="intro"){
contenido = `
<iframe src="pdf/introduccion1.pdf" style="width:100%; height:500px; border:none;"></iframe>

<br><br>

<a href="pdf/introduccion1.pdf" download style="background:#D88E8E; color:white; padding:10px 20px; border-radius:5px; text-decoration:none;">
Descargar Introducción 1
</a>

<br><br>

<iframe src="pdf/introduccion2.pdf" style="width:100%; height:500px; border:none;"></iframe>

Descargar Introducción 2
</a>
`;
}

/* OBJETIVOS (1 PDF) */
if(tipo=="objetivos"){
contenido = `
<iframe src="pdf/objetivos.pdf" style="width:100%; height:500px; border:none;"></iframe>

<br><br>

<a href="pdf/objetivos.pdf" download style="background:#D88E8E; color:white; padding:10px 20px; border-radius:5px; text-decoration:none;">
Descargar PDF
</a>
`;
}

/* DESARROLLO (2 PDFs) */
if(tipo=="desarrollo"){
contenido = `
<iframe src="pdf/desarrollo1.pdf" style="width:100%; height:500px; border:none;"></iframe>

<br><br>

<a href="pdf/desarrollo1.pdf" download style="background:#D88E8E; color:white; padding:10px 20px; border-radius:5px; text-decoration:none;">
Descargar Desarrollo 1
</a>

<br><br>

<iframe src="pdf/desarrollo2.pdf" style="width:100%; height:500px; border:none;"></iframe>

<br><br>

<a href="pdf/desarrollo2.pdf" download style="background:#D88E8E; color:white; padding:10px 20px; border-radius:5px; text-decoration:none;">
Descargar Desarrollo 2

`;
}

/* TAREA (2 PDFs) */
if(tipo=="tarea"){
contenido = `
<iframe src="pdf/tarea1.pdf" style="width:100%; height:500px; border:none;"></iframe>

<br><br>

<a href="pdf/tarea1.pdf" download style="background:#D88E8E; color:white; padding:10px 20px; border-radius:5px; text-decoration:none;">
Descargar Tarea 1
</a>

<br><br>

<iframe src="pdf/tarea2.pdf" style="width:100%; height:500px; border:none;"></iframe>

<br><br>

<a href="pdf/tarea2.pdf" download style="background:#D88E8E; color:white; padding:10px 20px; border-radius:5px; text-decoration:none;">
Descargar Tarea 2
</a>
`;
}

c.innerHTML = contenido;
}
</script>

</body>
</html>
